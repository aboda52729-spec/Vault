name: bankak_analytics
description: "Vault / الخزنة — Personal finance tracker for Bank of Khartoum"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  google_fonts: ^6.2.1
  intl: any
  shared_preferences: ^2.5.2
  flutter_sms_inbox: any
  permission_handler: ^11.3.1
  flutter_secure_storage: ^9.2.4

  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.70.2
  local_auth: ^2.3.0
  go_router: ^14.8.1
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

